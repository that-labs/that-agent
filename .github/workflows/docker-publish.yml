name: Build and Publish Docker Images

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        profile: [slim, full]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/that-labs/that-agent
          flavor: |
            suffix=${{ matrix.profile != 'slim' && format('-{0}', matrix.profile) || '' }}
          tags: |
            # branch push → ghcr.io/that-labs/that-agent:<branch>[-full]
            type=ref,event=branch
            # tag push → ghcr.io/that-labs/that-agent:<tag>[-full]
            type=ref,event=tag
            # tag push → also push :latest[-full]
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Prepare build context
        run: |
          BUILD_CTX=$(mktemp -d)
          echo "BUILD_CTX=$BUILD_CTX" >> "$GITHUB_ENV"

          cp sandbox/Dockerfile "$BUILD_CTX/"

          # Mirror the minimal context used by scripts/build-and-push.sh —
          # only Cargo files and crates are needed for the Rust build stage.
          rsync -a --prune-empty-dirs \
            --include='/Cargo.toml' \
            --include='/Cargo.lock' \
            --include='/rust-toolchain.toml' \
            --include='/.cargo/***' \
            --include='/crates/***' \
            --exclude='*' \
            ./ "$BUILD_CTX/"

          # Bake bundled skills into the image if present
          if [ -d sandbox/skills ]; then
            cp -r sandbox/skills "$BUILD_CTX/skills"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BUILD_CTX }}
          file: ${{ env.BUILD_CTX }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            THAT_RUNTIME_PROFILE=${{ matrix.profile }}
          cache-from: type=gha,scope=${{ matrix.profile }}
          cache-to: type=gha,scope=${{ matrix.profile }},mode=max
