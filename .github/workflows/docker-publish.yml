name: Build and Publish Docker Images

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/that-labs/that-agent

jobs:
  # ── Stage 1: Cross-compile Rust binary for each arch ──────────────────
  build-binary:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --bin that --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/that that
          file that

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: that-${{ matrix.arch }}
          path: that
          if-no-files-found: error
          retention-days: 1

  # ── Stage 2: Build Docker image per arch+profile ──────────────────────
  # Uses --build-context to override the builder stage with the pre-built
  # binary, skipping Rust compilation inside Docker entirely.
  build-image:
    runs-on: ubuntu-latest
    needs: build-binary
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: slim
            arch: amd64
            platform: linux/amd64
          - profile: slim
            arch: arm64
            platform: linux/arm64
          - profile: full
            arch: amd64
            platform: linux/amd64
          - profile: full
            arch: arm64
            platform: linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: that-${{ matrix.arch }}
          path: /tmp/builder-ctx/build

      - name: Prepare builder context
        run: chmod +x /tmp/builder-ctx/build/that

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            THAT_RUNTIME_PROFILE=${{ matrix.profile }}
          build-contexts: |
            builder=/tmp/builder-ctx
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.profile }}-${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.profile }}-${{ matrix.arch }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.profile }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Stage 3: Merge per-arch images into multi-arch manifest ───────────
  merge:
    runs-on: ubuntu-latest
    needs: build-image
    strategy:
      matrix:
        profile: [slim, full]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.profile }}-*
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          flavor: |
            suffix=${{ matrix.profile != 'slim' && format('-{0}', matrix.profile) || '' }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect "$(jq -cr '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")"
