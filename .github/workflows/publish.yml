name: Publish to crates.io

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Publish in dependency order (leaf crates first)
      # Each step: skip if already published (idempotent retries), sleep to avoid rate limit
      - name: Publish that-tools
        run: |
          output=$(cargo publish -p that-tools --token ${{ secrets.CARGO_REGISTRY_TOKEN }} 2>&1) && echo "$output" || { echo "$output"; echo "$output" | grep -q 'already exists' || exit 1; echo "Already published, skipping"; }

      - name: Wait for crates.io rate limit
        run: sleep 5

      - name: Publish that-sandbox
        run: |
          output=$(cargo publish -p that-sandbox --token ${{ secrets.CARGO_REGISTRY_TOKEN }} 2>&1) && echo "$output" || { echo "$output"; echo "$output" | grep -q 'already exists' || exit 1; echo "Already published, skipping"; }

      - name: Wait for crates.io rate limit
        run: sleep 5

      - name: Publish that-channels
        run: |
          output=$(cargo publish -p that-channels --token ${{ secrets.CARGO_REGISTRY_TOKEN }} 2>&1) && echo "$output" || { echo "$output"; echo "$output" | grep -q 'already exists' || exit 1; echo "Already published, skipping"; }

      - name: Wait for crates.io rate limit
        run: sleep 5

      - name: Publish that-plugins
        run: |
          output=$(cargo publish -p that-plugins --token ${{ secrets.CARGO_REGISTRY_TOKEN }} 2>&1) && echo "$output" || { echo "$output"; echo "$output" | grep -q 'already exists' || exit 1; echo "Already published, skipping"; }

      - name: Wait for crates.io rate limit
        run: sleep 5

      - name: Publish that-core
        run: |
          output=$(cargo publish -p that-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }} 2>&1) && echo "$output" || { echo "$output"; echo "$output" | grep -q 'already exists' || exit 1; echo "Already published, skipping"; }

      - name: Wait for crates.io rate limit
        run: sleep 5

      - name: Publish that-eval
        run: |
          output=$(cargo publish -p that-eval --token ${{ secrets.CARGO_REGISTRY_TOKEN }} 2>&1) && echo "$output" || { echo "$output"; echo "$output" | grep -q 'already exists' || exit 1; echo "Already published, skipping"; }

      - name: Wait for crates.io rate limit
        run: sleep 5

      - name: Publish that-cli
        run: |
          output=$(cargo publish -p that-cli --token ${{ secrets.CARGO_REGISTRY_TOKEN }} 2>&1) && echo "$output" || { echo "$output"; echo "$output" | grep -q 'already exists' || exit 1; echo "Already published, skipping"; }
