  THAT_SANDBOX_K8S_REGISTRY: "registry.local:5000"
  THAT_SANDBOX_K8S_REGISTRY_PUSH_ENDPOINT: ""
  THAT_AGENT_NAME: "my-agent"
  THAT_AGENT_BOOTSTRAP_PROMPT: ""
  THAT_AGENT_PROVIDER: "anthropic"
  THAT_AGENT_MODEL: "claude-sonnet-4-6"
  THAT_AGENT_MAX_TURNS: "75"
