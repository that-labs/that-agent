apiVersion: apps/v1
kind: Deployment
metadata:
  name: that-agent-cache-proxy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: that-agent
      app.kubernetes.io/component: cache-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: that-agent
        app.kubernetes.io/component: cache-proxy
    spec:
      containers:
        - name: cache-proxy
          image: ghcr.io/that-labs/that-agent:latest
          imagePullPolicy: Always
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              mkdir -p /var/cache/proxy
              if command -v squid >/dev/null 2>&1; then
                cat > /tmp/squid.conf <<'CONF'
              http_port 3128
              cache_dir ufs /var/cache/proxy 4096 16 256
              maximum_object_size 512 MB
              cache_mem 256 MB
              access_log none
              http_access allow all
              CONF
                exec squid -N -f /tmp/squid.conf
              else
                echo "squid not available, running minimal TCP proxy passthrough"
                exec python3 -c "
              import socketserver, socket, threading, sys
              class ProxyHandler(socketserver.StreamRequestHandler):
                  def handle(self):
                      line = self.rfile.readline(65537)
                      if b'CONNECT' in line:
                          host_port = line.split()[1].decode()
                          host, port = host_port.rsplit(':', 1)
                          try:
                              remote = socket.create_connection((host, int(port)), timeout=10)
                              self.wfile.write(b'HTTP/1.1 200 Connection Established\r\n\r\n')
                              self.wfile.flush()
                              def forward(src, dst):
                                  try:
                                      while True:
                                          data = src.recv(65536)
                                          if not data: break
                                          dst.sendall(data)
                                  except: pass
                              t = threading.Thread(target=forward, args=(remote, self.request))
                              t.daemon = True
                              t.start()
                              forward(self.request, remote)
                              remote.close()
                          except Exception as e:
                              self.wfile.write(f'HTTP/1.1 502 Bad Gateway\r\n\r\n{e}'.encode())
              server = socketserver.ThreadingTCPServer(('0.0.0.0', 3128), ProxyHandler)
              server.serve_forever()
              "
              fi
          ports:
            - containerPort: 3128
              name: cache-proxy
          volumeMounts:
            - name: proxy-cache
              mountPath: /var/cache/proxy
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
      volumes:
        - name: proxy-cache
          emptyDir:
            sizeLimit: 8Gi
