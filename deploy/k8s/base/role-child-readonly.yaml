apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: that-agent-child-readonly
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - configmaps
      - events
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - secrets
    verbs: ["get"]
  - apiGroups: [""]
    resources:
      - services
    verbs: ["get", "list", "watch"]
