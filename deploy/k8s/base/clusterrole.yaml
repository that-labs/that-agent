apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: that-agent-cluster
rules:
  # Read-only cross-namespace monitoring
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - events
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
    verbs: ["get", "list", "watch"]
