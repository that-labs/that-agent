apiVersion: apps/v1
kind: Deployment
metadata:
  name: that-agent
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: that-agent
      app.kubernetes.io/component: runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: that-agent
        app.kubernetes.io/component: runtime
    spec:
      serviceAccountName: that-agent
      automountServiceAccountToken: true
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: that-agent
          image: ghcr.io/that-labs/that-agent:latest
          imagePullPolicy: Always
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          command: ["/bin/bash", "/opt/that/bootstrap/entrypoint.sh"]
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: THAT_K8S_SERVICE_ACCOUNT
              value: that-agent
            - name: THAT_AGENT_PARENT
              valueFrom:
                configMapKeyRef:
                  name: that-agent-config
                  key: THAT_AGENT_PARENT
                  optional: true
            - name: THAT_AGENT_ROLE
              valueFrom:
                configMapKeyRef:
                  name: that-agent-config
                  key: THAT_AGENT_ROLE
                  optional: true
          envFrom:
            - configMapRef:
                name: that-agent-config
            - secretRef:
                name: that-agent-secrets
          volumeMounts:
            - name: agent-home
              mountPath: /home/agent/.that-agent
            - name: workspace
              mountPath: /workspace
            - name: entrypoint-script
              mountPath: /opt/that/bootstrap
              readOnly: true
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "test -f /tmp/that-agent-ready"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  test -f /tmp/that-agent-alive && \
                  [ $(( $(date +%s) - $(stat -c %Y /tmp/that-agent-alive) )) -lt 30 ]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: agent-home
          persistentVolumeClaim:
            claimName: that-agent-home
        - name: workspace
          emptyDir: {}
        - name: entrypoint-script
          configMap:
            name: that-agent-entrypoint
            defaultMode: 493
