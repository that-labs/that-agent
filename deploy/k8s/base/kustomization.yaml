apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - serviceaccount.yaml
  - role.yaml
  - role-child-readonly.yaml
  - role-child-sandbox.yaml
  - rolebinding.yaml
  - clusterrole.yaml
  - clusterrolebinding.yaml
  - network-policy.yaml
  - pvc.yaml
  - configmap.yaml
  - gateway-service.yaml
  - deployment.yaml
  # Uncomment to enable Phoenix observability (heavy — ~512Mi memory)
  # - phoenix-deployment.yaml
  # - phoenix-service.yaml
  # Infrastructure pods — each is independent, remove lines to exclude
  - buildkit-deployment.yaml
  - buildkit-service.yaml
  - git-server-deployment.yaml
  - git-server-service.yaml
  - cache-proxy-deployment.yaml
  - cache-proxy-service.yaml

configMapGenerator:
  - name: that-agent-entrypoint
    files:
      - entrypoint.sh=entrypoint.sh

labels:
  - pairs:
      app.kubernetes.io/name: that-agent
      app.kubernetes.io/part-of: that-agent
    includeSelectors: true
  - pairs:
      that-agent/managed: "true"
    includeSelectors: false
