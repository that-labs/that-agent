apiVersion: v1
kind: ConfigMap
metadata:
  name: that-agent-config
data:
  THAT_SANDBOX_MODE: "kubernetes"
  THAT_TRUSTED_LOCAL_SANDBOX: "1"
  THAT_SANDBOX_K8S_NAMESPACE: "that-agent"
  THAT_SANDBOX_K8S_REGISTRY: "registry.local:5000"
  THAT_SANDBOX_K8S_REGISTRY_PUSH_ENDPOINT: ""
  THAT_K8S_REGISTRY_AUTOFIX_LOCALHOST_PORT: "1"
  THAT_AGENT_NAME: "default"
  THAT_AGENT_BOOTSTRAP_PROMPT: ""
  THAT_AGENT_PROVIDER: "anthropic"
  THAT_AGENT_MODEL: "claude-sonnet-4-6"
  THAT_AGENT_MAX_TURNS: "75"
  THAT_PROMPT_CACHE_ALERTS: "1"
  THAT_SANDBOX_REMOVE_ON_EXIT: "0"
  THAT_BUILDKIT_SOURCE: "buildkit_service"
  THAT_BUILDKIT_GC_KEEPSTORAGE_MB: "4096"
  THAT_BUILDKIT_WAIT_SECONDS: "3"
  THAT_IMAGE_BUILD_BACKEND_PREFERRED: "buildkit"
  THAT_DOCKER_DAEMON_WAIT_SECONDS: "3"
  THAT_DOCKER_DAEMON_SOURCE: ""
  THAT_SHELL_EXEC_ALLOW_OTEL: "0"
  PHOENIX_TRACING: "false"
  OTEL_EXPORTER_OTLP_ENDPOINT: ""
  PHOENIX_LOG_LEVEL: "info"
  PHOENIX_EXPORTER_LOG_ERRORS: "false"
  THAT_AGENT_PARENT: ""
  THAT_AGENT_ROLE: ""
  RUST_LOG: "info"
  # Git server — multi-agent coordination
  THAT_GIT_WEBHOOK_URL: ""
  THAT_GIT_AUTO_MERGE: "false"
