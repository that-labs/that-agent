{{- if and .Values.agentSandbox.enabled (ne .Values.accessLevel "readonly") }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "that-agent.fullname" . }}-sandbox-manager
  labels:
    {{- include "that-agent.labels" . | nindent 4 }}
rules:
- apiGroups: ["agent-sandbox.io"]
  resources: ["sandboxes", "sandboxclaims", "sandboxtemplates", "sandboxwarmpools"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "that-agent.fullname" . }}-sandbox-manager
  labels:
    {{- include "that-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "that-agent.fullname" . }}-sandbox-manager
subjects:
- kind: ServiceAccount
  name: {{ include "that-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
