apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "that-agent.fullname" . }}-config
  labels:
    {{- include "that-agent.labels" . | nindent 4 }}
data:
  THAT_SANDBOX_MODE: "kubernetes"
  THAT_TRUSTED_LOCAL_SANDBOX: "1"
  THAT_SANDBOX_K8S_NAMESPACE: {{ .Release.Namespace | quote }}
  THAT_SANDBOX_K8S_REGISTRY: {{ .Values.registry.host | quote }}
  THAT_SANDBOX_K8S_REGISTRY_PUSH_ENDPOINT: {{ .Values.registry.pushEndpoint | default .Values.registry.host | quote }}
  THAT_K8S_REGISTRY_AUTOFIX_LOCALHOST_PORT: "1"
  THAT_AGENT_NAME: {{ .Values.agent.name | quote }}
  THAT_AGENT_BOOTSTRAP_PROMPT: {{ .Values.agent.bootstrapPrompt | quote }}
  THAT_AGENT_PROVIDER: {{ .Values.agent.provider | quote }}
  THAT_AGENT_MODEL: {{ .Values.agent.model | quote }}
  THAT_AGENT_MAX_TURNS: {{ .Values.agent.maxTurns | toString | quote }}
  THAT_GATEWAY_URL: {{ .Values.gateway.url | quote }}
  THAT_GATEWAY_ADDR: {{ .Values.gateway.addr | quote }}
  THAT_PROMPT_CACHE_ALERTS: "1"
  THAT_SANDBOX_REMOVE_ON_EXIT: "0"
  THAT_BUILDKIT_SOURCE: "buildkit_service"
  THAT_BUILDKIT_GC_KEEPSTORAGE_MB: "15360"
  THAT_BUILDKIT_WAIT_SECONDS: "3"
  THAT_IMAGE_BUILD_BACKEND_PREFERRED: "buildkit"
  THAT_DOCKER_DAEMON_WAIT_SECONDS: "3"
  THAT_DOCKER_DAEMON_SOURCE: ""
  THAT_SHELL_EXEC_ALLOW_OTEL: "0"
  THAT_AGENT_CHILD_CPU_LIMIT: {{ .Values.childAgents.cpuLimit | quote }}
  THAT_AGENT_CHILD_MEMORY_LIMIT: {{ .Values.childAgents.memoryLimit | quote }}
  {{- if .Values.gitServer.enabled }}
  THAT_GIT_SERVER_URL: {{ include "that-agent.gitServerUrl" . | quote }}
  {{- end }}
  {{- if .Values.cacheProxy.enabled }}
  THAT_CACHE_PROXY_URL: {{ include "that-agent.cacheProxyUrl" . | quote }}
  {{- end }}
  {{- if .Values.buildkit.enabled }}
  BUILDKIT_HOST: {{ include "that-agent.buildkitHost" . | quote }}
  {{- else if .Values.buildkit.externalHost }}
  BUILDKIT_HOST: {{ .Values.buildkit.externalHost | quote }}
  {{- end }}
  THAT_HELM_CHART: {{ .Values.helmChart | default "oci://ghcr.io/that-labs/helm/that-agent" | quote }}
  THAT_HELM_CHART_VERSION: {{ .Chart.Version | quote }}
  THAT_GIT_WEBHOOK_URL: ""
  THAT_GIT_AUTO_MERGE: "false"
  THAT_AGENT_PARENT: {{ .Values.agent.parent | quote }}
  THAT_AGENT_ROLE: {{ .Values.agent.agentRole | quote }}
  {{- if ne .Values.agent.role "root" }}
  THAT_PARENT_GATEWAY_URL: {{ .Values.agent.parentGatewayUrl | default "" | quote }}
  THAT_PARENT_GATEWAY_TOKEN: {{ .Values.agent.parentGatewayToken | default "" | quote }}
  {{- end }}
  {{- if and (eq .Values.agent.role "ephemeral") .Values.agent.job.workspace }}
  GIT_REPO_URL: {{ .Values.agent.job.gitRepoUrl | quote }}
  GIT_BRANCH: {{ .Values.agent.job.gitBranch | quote }}
  {{- end }}
  RUST_LOG: "info"
  PHOENIX_TRACING: {{ .Values.observability.phoenixTracing | toString | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.observability.otelEndpoint | quote }}
  PHOENIX_LOG_LEVEL: "info"
  PHOENIX_EXPORTER_LOG_ERRORS: "false"
---
{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "that-agent.fullname" . }}-secrets
  labels:
    {{- include "that-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.claudeCodeOauthToken }}
  CLAUDE_CODE_OAUTH_TOKEN: {{ .Values.secrets.claudeCodeOauthToken | quote }}
  {{- end }}
  {{- if .Values.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.openrouterApiKey }}
  OPENROUTER_API_KEY: {{ .Values.secrets.openrouterApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.telegramBotToken }}
  TELEGRAM_BOT_TOKEN: {{ .Values.secrets.telegramBotToken | quote }}
  {{- end }}
  {{- if .Values.secrets.telegramChatId }}
  TELEGRAM_CHAT_ID: {{ .Values.secrets.telegramChatId | quote }}
  {{- end }}
{{- end }}
