{{- if ne .Values.agent.role "ephemeral" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "that-agent.fullname" . }}
  labels:
    {{- include "that-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: runtime
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "that-agent.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: runtime
  template:
    metadata:
      labels:
        {{- include "that-agent.labels" . | nindent 8 }}
        app.kubernetes.io/component: runtime
    spec:
      serviceAccountName: {{ include "that-agent.serviceAccountName" . }}
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: {{ .Values.agent.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: that-agent
          image: "{{ .Values.agent.image.repository }}:{{ include "that-agent.imageTag" . }}"
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          {{- if eq .Values.agent.role "root" }}
          command: ["/bin/bash", "/opt/that/bootstrap/entrypoint.sh"]
          {{- else }}
          command: ["that", "--agent", {{ .Values.agent.name | quote }}, "run", "listen", "--no-sandbox"]
          {{- end }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: THAT_K8S_SERVICE_ACCOUNT
              value: {{ include "that-agent.serviceAccountName" . }}
            - name: THAT_AGENT_PARENT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "that-agent.fullname" . }}-config
                  key: THAT_AGENT_PARENT
                  optional: true
            - name: THAT_AGENT_ROLE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "that-agent.fullname" . }}-config
                  key: THAT_AGENT_ROLE
                  optional: true
          envFrom:
            - configMapRef:
                name: {{ include "that-agent.fullname" . }}-config
            - secretRef:
                name: {{ include "that-agent.secretName" . }}
                optional: true
          ports:
            - name: gateway
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: agent-home
              mountPath: /home/agent/.that-agent
            - name: workspace
              mountPath: /workspace
          {{- if eq .Values.agent.role "root" }}
            - name: entrypoint-script
              mountPath: /opt/that/bootstrap
              readOnly: true
          {{- end }}
          {{- if .Values.agent.identityConfigMap }}
            - name: identity
              mountPath: /etc/agent-identity
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "test -f /tmp/that-agent-ready"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  test -f /tmp/that-agent-alive && \
                  [ $(( $(date +%s) - $(stat -c %Y /tmp/that-agent-alive) )) -lt 30 ]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      {{- if .Values.dind.enabled }}
        - name: dind
          image: docker:dind
          securityContext:
            privileged: true
          volumeMounts:
            - name: docker-socket
              mountPath: /var/run
            - name: docker-data
              mountPath: /var/lib/docker
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
      {{- end }}
      volumes:
        - name: agent-home
          persistentVolumeClaim:
            claimName: {{ .Values.agent.storage.existingClaim | default (printf "%s-home" (include "that-agent.fullname" .)) }}
        - name: workspace
          emptyDir: {}
      {{- if eq .Values.agent.role "root" }}
        - name: entrypoint-script
          configMap:
            name: {{ include "that-agent.fullname" . }}-entrypoint
            defaultMode: 0755
      {{- end }}
      {{- if .Values.agent.identityConfigMap }}
        - name: identity
          configMap:
            name: {{ .Values.agent.identityConfigMap }}
      {{- end }}
      {{- if .Values.dind.enabled }}
        - name: docker-socket
          emptyDir: {}
        - name: docker-data
          emptyDir: {}
      {{- end }}
{{- end }}
{{- if eq .Values.agent.role "root" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "that-agent.fullname" . }}-entrypoint
  labels:
    {{- include "that-agent.labels" . | nindent 4 }}
data:
  entrypoint.sh: |
{{ .Files.Get "files/entrypoint.sh" | indent 4 }}
{{- end }}
