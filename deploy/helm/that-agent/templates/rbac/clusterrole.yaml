{{- if eq .Values.accessLevel "cluster-admin" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "that-agent.fullname" . }}-cluster
  labels:
    {{- include "that-agent.labels" . | nindent 4 }}
rules:
  # Read-only cross-namespace monitoring
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - events
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
    verbs: ["get", "list", "watch"]
{{- end }}
